<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Klein 4B Image-to-Image — Staging vs Production</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0d1117; color: #e6edf3; padding: 2rem; padding-top: 0;
        }
        h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; padding-top: 1.5rem; }
        .subtitle { text-align: center; color: #8b949e; margin-bottom: 1.5rem; font-size: 0.95rem; line-height: 1.6; }
        .card {
            background: #161b22; border: 1px solid #21262d; border-radius: 8px;
            margin-bottom: 1.5rem; overflow: hidden;
        }
        .card-header {
            padding: 0.75rem 1rem; background: #1c2128; border-bottom: 1px solid #21262d;
            display: flex; align-items: flex-start; gap: 0.75rem;
            cursor: pointer; user-select: none;
        }
        .card-header:hover { background: #22272e; }
        .card-header .num {
            background: #238636; color: #fff; padding: 0.15rem 0.5rem;
            border-radius: 4px; font-size: 0.8rem; font-weight: 600; flex-shrink: 0;
        }
        .card-header .category {
            background: #388bfd33; color: #58a6ff; padding: 0.15rem 0.5rem;
            border-radius: 4px; font-size: 0.75rem; font-weight: 600; flex-shrink: 0;
        }
        .card-header .prompt-text { color: #e6edf3; font-size: 0.85rem; line-height: 1.4; flex: 1; }
        .card-header .chevron {
            color: #484f58; font-size: 0.75rem; flex-shrink: 0;
            transition: transform 0.2s; margin-top: 0.15rem; width: 1em; text-align: center;
        }
        .card.collapsed .card-body { display: none; }
        .card.collapsed .card-header .chevron { transform: rotate(-90deg); }
        .images { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; }
        .img-col { padding: 0.75rem; }
        .img-col:not(:last-child) { border-right: 1px solid #21262d; }
        .img-label {
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.05em; margin-bottom: 0.4rem;
        }
        .img-wrapper {
            position: relative; width: 100%; aspect-ratio: 1/1;
            background: #000; border-radius: 4px; overflow: hidden; cursor: zoom-in;
        }
        .img-wrapper img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; border-radius: 4px;
        }
        /* Lightbox */
        .lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 100; align-items: center;
            justify-content: center; cursor: zoom-out;
        }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 6px; }
        .lightbox .lb-label {
            position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            background: #161b22ee; border: 1px solid #30363d; padding: 0.5rem 1.2rem;
            border-radius: 8px; font-size: 0.85rem; color: #8b949e; text-align: center;
            pointer-events: none;
        }
        @media (max-width: 900px) {
            .images { grid-template-columns: 1fr; }
            .img-col:not(:last-child) { border-right: none; border-bottom: 1px solid #21262d; }
            body { padding: 1rem; padding-top: 0; }
        }
    </style>
</head>
<body>
    <h1>Klein 4B Image-to-Image</h1>
    <p class="subtitle">
        <strong style="color: #8b949e">Input</strong> →
        <strong style="color: #f78166">Staging</strong> vs
        <strong style="color: #3fb950">Production</strong>
        &nbsp;—&nbsp; 10 edit tests &nbsp;·&nbsp; 1024×1024 &nbsp;·&nbsp; Same seeds
    </p>
    <div id="cards"></div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <img id="lbImg" src="" alt="" />
        <div class="lb-label" id="lbLabel"></div>
    </div>

    <script>
        const TESTS = [
            { idx: 0, inputSeed: 100, editSeed: 200, category: "Color change", prompt: "Change the car color from red to bright blue", desc: "Red sports car on city street" },
            { idx: 1, inputSeed: 101, editSeed: 201, category: "Add character", prompt: "Add a golden retriever sitting next to her on the bench", desc: "Woman on park bench reading" },
            { idx: 2, inputSeed: 102, editSeed: 202, category: "Remove object", prompt: "Remove the cat from the scene", desc: "Living room with cat on rug" },
            { idx: 3, inputSeed: 103, editSeed: 203, category: "Replace object", prompt: "Replace the red roses with bright yellow sunflowers", desc: "Table with roses, coffee, book" },
            { idx: 4, inputSeed: 104, editSeed: 204, category: "Enhancement", prompt: "Make the image sharper and clearer with crisp details", desc: "Blurry mountain landscape" },
            { idx: 5, inputSeed: 105, editSeed: 205, category: "Lighting change", prompt: "Change it to nighttime with warm ambient lighting and the lights on", desc: "Modern kitchen, daytime" },
            { idx: 6, inputSeed: 106, editSeed: 206, category: "Clothing swap", prompt: "Change the white t-shirt to a black leather jacket", desc: "Man in white t-shirt" },
            { idx: 7, inputSeed: 107, editSeed: 207, category: "Weather change", prompt: "Add a dramatic storm with dark clouds and lightning approaching from the horizon", desc: "Beach with palm tree, sunny" },
            { idx: 8, inputSeed: 108, editSeed: 208, category: "Add detail", prompt: "Add a colorful floral pattern to the mug and fill it with steaming coffee", desc: "Plain white mug on desk" },
            { idx: 9, inputSeed: 109, editSeed: 209, category: "Season change", prompt: "Transform this into a winter scene with snow covering everything", desc: "Summer garden with fence" },
        ];

        function pad2(n) { return String(n).padStart(2, "0"); }
        function escapeHtml(s) { const el = document.createElement("span"); el.textContent = s; return el.innerHTML; }

        function openLightbox(src, label) {
            document.getElementById("lbImg").src = src;
            document.getElementById("lbLabel").innerHTML = label;
            document.getElementById("lightbox").classList.add("active");
            document.body.style.overflow = "hidden";
        }
        function closeLightbox() {
            document.getElementById("lightbox").classList.remove("active");
            document.body.style.overflow = "";
        }
        document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });

        const container = document.getElementById("cards");

        TESTS.forEach(test => {
            const card = document.createElement("div");
            card.className = "card";

            const header = document.createElement("div");
            header.className = "card-header";
            header.innerHTML =
                `<span class="chevron">▼</span>` +
                `<span class="num">${test.idx + 1}</span>` +
                `<span class="category">${test.category}</span>` +
                `<span class="prompt-text">${escapeHtml(test.prompt)}</span>`;
            header.addEventListener("click", () => card.classList.toggle("collapsed"));
            card.appendChild(header);

            const body = document.createElement("div");
            body.className = "card-body";
            const grid = document.createElement("div");
            grid.className = "images";

            const sources = [
                { label: "Input", color: "#8b949e", path: `inputs/${pad2(test.idx)}_seed${test.inputSeed}.png` },
                { label: "Staging", color: "#f78166", path: `staging/${pad2(test.idx)}_seed${test.editSeed}.png` },
                { label: "Production", color: "#3fb950", path: `production/${pad2(test.idx)}_seed${test.editSeed}.png` },
            ];

            sources.forEach(src => {
                const col = document.createElement("div");
                col.className = "img-col";

                const label = document.createElement("div");
                label.className = "img-label";
                label.style.color = src.color;
                label.textContent = src.label;
                col.appendChild(label);

                const wrapper = document.createElement("div");
                wrapper.className = "img-wrapper";
                const img = document.createElement("img");
                img.loading = "lazy";
                img.src = src.path;
                img.alt = `${src.label} — Test ${test.idx + 1}`;
                img.addEventListener("click", e => {
                    e.stopPropagation();
                    openLightbox(src.path, `<strong style="color:${src.color}">${src.label}</strong> · #${test.idx + 1} ${test.category}`);
                });
                wrapper.appendChild(img);
                col.appendChild(wrapper);
                grid.appendChild(col);
            });

            body.appendChild(grid);
            card.appendChild(body);
            container.appendChild(card);
        });
    </script>
</body>
</html>
